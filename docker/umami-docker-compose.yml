version: '3'

services:
  umami:
    image: docker.umami.is/umami-software/umami:postgresql-latest
    container_name: umami
    restart: always
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://umami:umami_password_change_me@postgres:5432/umami
      DATABASE_TYPE: postgresql
      HASH_SALT: ${UMAMI_HASH_SALT:-change-me-to-a-random-string}
      APP_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - umami-network

  postgres:
    image: postgres:15-alpine
    container_name: umami-postgres
    restart: always
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: umami_password_change_me
    volumes:
      - umami-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - umami-network

volumes:
  umami-db-data:

networks:
  umami-network:
    driver: bridge





