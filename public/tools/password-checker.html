<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Checker - Test Your Password Security | NexCMS</title>
    <meta name="description" content="Free password strength checker. Test your password security, get strength score, and tips to create stronger passwords.">
    <meta name="keywords" content="password checker, password strength, password security, password tester, strong password, NexCMS">
    <link rel="canonical" href="${process.env.SITE_URL || 'http://localhost:3000'}/password-checker">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=5a8f3b2c">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            line-height: 1.6;
        }
        .header {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            padding: 15px 0;
            border-bottom: 2px solid #333;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .nav { display: flex; justify-content: space-between; align-items: center; }
        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            color: #00ff88;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 10px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.2);
        }
        .logo i { font-size: 1.6rem; filter: drop-shadow(0 0 10px rgba(0, 255, 136, 0.5)); }
        .hero {
            text-align: center;
            padding: 60px 0 40px;
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
        }
        .hero h1 {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tool-section {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 40px;
            margin: 40px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .password-input-wrapper {
            position: relative;
            margin-bottom: 30px;
        }
        .password-input {
            width: 100%;
            padding: 20px 50px 20px 20px;
            background: #0a0a0a;
            border: 2px solid rgba(0, 255, 136, 0.3);
            border-radius: 12px;
            color: #ffffff;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }
        .password-input:focus {
            outline: none;
            border-color: #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 1.2rem;
            transition: color 0.3s;
        }
        .toggle-password:hover { color: #00ff88; }
        .strength-meter {
            height: 10px;
            background: #0a0a0a;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .strength-fill {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
            border-radius: 10px;
        }
        .strength-weak { background: #ff0000; width: 25%; }
        .strength-fair { background: #ffaa00; width: 50%; }
        .strength-good { background: #00ff88; width: 75%; }
        .strength-strong { background: #00ff88; width: 100%; }
        .strength-label {
            text-align: center;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 20px;
        }
        .strength-weak-label { color: #ff0000; }
        .strength-fair-label { color: #ffaa00; }
        .strength-good-label { color: #00ff88; }
        .strength-strong-label { color: #00ff88; }
        .score-display {
            text-align: center;
            font-size: 3rem;
            font-weight: 900;
            margin: 20px 0;
        }
        .checks {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }
        .check-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            background: #0a0a0a;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .check-item.passed {
            border-color: rgba(0, 255, 136, 0.3);
            background: rgba(0, 255, 136, 0.05);
        }
        .check-item i {
            font-size: 1.2rem;
            width: 24px;
        }
        .check-item.passed i { color: #00ff88; }
        .check-item.failed i { color: #ff0000; }
        .tips {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin-top: 30px;
        }
        .tips h3 {
            color: #00ff88;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .tips ul {
            list-style: none;
            padding-left: 0;
        }
        .tips li {
            padding: 8px 0;
            padding-left: 25px;
            position: relative;
        }
        .tips li:before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #00ff88;
            font-weight: bold;
        }
        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; }
            .tool-section { padding: 20px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <nav class="nav">
                <a href="/" class="logo"><i class="fas fa-shield-alt"></i><span>NexCMS</span></a>
            </nav>
        </div>
    </header>
    
    <div class="container">
        <section class="hero">
            <h1><i class="fas fa-key"></i> Password Strength Checker</h1>
            <p>Test your password security and get instant feedback</p>
        </section>
        
        <section class="tool-section">
            <div class="password-input-wrapper">
                <input type="password" 
                       id="passwordInput" 
                       class="password-input" 
                       placeholder="Enter your password to check its strength..."
                       autocomplete="off">
                <button class="toggle-password" onclick="togglePassword()">
                    <i class="fas fa-eye" id="toggleIcon"></i>
                </button>
            </div>
            
            <div class="strength-meter">
                <div class="strength-fill" id="strengthFill"></div>
            </div>
            
            <div class="strength-label" id="strengthLabel">Enter a password to check</div>
            <div class="score-display" id="scoreDisplay">-</div>
            
            <div class="checks" id="checksContainer"></div>
            
            <div class="tips" id="tipsContainer" style="display: none;">
                <h3><i class="fas fa-lightbulb"></i> Tips for a Strong Password</h3>
                <ul id="tipsList"></ul>
            </div>
        </section>
    </div>
    
    <script>
        function togglePassword() {
            const input = document.getElementById('passwordInput');
            const icon = document.getElementById('toggleIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
        
        function checkPassword(password) {
            if (!password) {
                document.getElementById('strengthLabel').textContent = 'Enter a password to check';
                document.getElementById('strengthLabel').className = 'strength-label';
                document.getElementById('strengthFill').className = 'strength-fill';
                document.getElementById('strengthFill').style.width = '0%';
                document.getElementById('scoreDisplay').textContent = '-';
                document.getElementById('checksContainer').innerHTML = '';
                document.getElementById('tipsContainer').style.display = 'none';
                return;
            }
            
            let score = 0;
            const checks = [];
            const tips = [];
            
            // Length check
            if (password.length >= 12) {
                score += 20;
                checks.push({ text: 'At least 12 characters', passed: true });
            } else {
                checks.push({ text: 'At least 12 characters (currently ' + password.length + ')', passed: false });
                tips.push('Use at least 12 characters');
            }
            
            // Uppercase
            if (/[A-Z]/.test(password)) {
                score += 15;
                checks.push({ text: 'Contains uppercase letters', passed: true });
            } else {
                checks.push({ text: 'Contains uppercase letters', passed: false });
                tips.push('Include uppercase letters (A-Z)');
            }
            
            // Lowercase
            if (/[a-z]/.test(password)) {
                score += 15;
                checks.push({ text: 'Contains lowercase letters', passed: true });
            } else {
                checks.push({ text: 'Contains lowercase letters', passed: false });
                tips.push('Include lowercase letters (a-z)');
            }
            
            // Numbers
            if (/\d/.test(password)) {
                score += 15;
                checks.push({ text: 'Contains numbers', passed: true });
            } else {
                checks.push({ text: 'Contains numbers', passed: false });
                tips.push('Include numbers (0-9)');
            }
            
            // Special characters
            if (/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password)) {
                score += 20;
                checks.push({ text: 'Contains special characters', passed: true });
            } else {
                checks.push({ text: 'Contains special characters', passed: false });
                tips.push('Include special characters (!@#$%^&*)');
            }
            
            // No common patterns
            const commonPatterns = ['123', 'abc', 'password', 'qwerty', 'admin'];
            const hasCommonPattern = commonPatterns.some(pattern => 
                password.toLowerCase().includes(pattern.toLowerCase())
            );
            if (!hasCommonPattern) {
                score += 10;
                checks.push({ text: 'No common patterns', passed: true });
            } else {
                checks.push({ text: 'Avoids common patterns', passed: false });
                tips.push('Avoid common patterns like "123" or "password"');
            }
            
            // No repeated characters
            if (!/(.)\1{2,}/.test(password)) {
                score += 5;
                checks.push({ text: 'No repeated characters', passed: true });
            } else {
                checks.push({ text: 'No repeated characters', passed: false });
                tips.push('Avoid repeating the same character multiple times');
            }
            
            // Display results
            const strengthFill = document.getElementById('strengthFill');
            const strengthLabel = document.getElementById('strengthLabel');
            const scoreDisplay = document.getElementById('scoreDisplay');
            
            scoreDisplay.textContent = score + '/100';
            
            if (score < 40) {
                strengthFill.className = 'strength-fill strength-weak';
                strengthLabel.textContent = 'Weak Password';
                strengthLabel.className = 'strength-label strength-weak-label';
            } else if (score < 60) {
                strengthFill.className = 'strength-fill strength-fair';
                strengthLabel.textContent = 'Fair Password';
                strengthLabel.className = 'strength-label strength-fair-label';
            } else if (score < 80) {
                strengthFill.className = 'strength-fill strength-good';
                strengthLabel.textContent = 'Good Password';
                strengthLabel.className = 'strength-label strength-good-label';
            } else {
                strengthFill.className = 'strength-fill strength-strong';
                strengthLabel.textContent = 'Strong Password';
                strengthLabel.className = 'strength-label strength-strong-label';
            }
            
            // Display checks
            const checksContainer = document.getElementById('checksContainer');
            checksContainer.innerHTML = checks.map(check => `
                <div class="check-item ${check.passed ? 'passed' : 'failed'}">
                    <i class="fas ${check.passed ? 'fa-check-circle' : 'fa-times-circle'}"></i>
                    <span>${check.text}</span>
                </div>
            `).join('');
            
            // Display tips if needed
            const tipsContainer = document.getElementById('tipsContainer');
            const tipsList = document.getElementById('tipsList');
            if (tips.length > 0) {
                tipsContainer.style.display = 'block';
                tipsList.innerHTML = tips.map(tip => `<li>${tip}</li>`).join('');
            } else {
                tipsContainer.style.display = 'none';
            }
        }
        
        document.getElementById('passwordInput').addEventListener('input', (e) => {
            checkPassword(e.target.value);
        });
    </script>
</body>
</html>
