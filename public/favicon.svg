<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00cc6a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Dark background circle for better visibility on light backgrounds -->
  <circle cx="32" cy="32" r="30" fill="url(#bgGrad)" stroke="#00ff88" stroke-width="1" opacity="0.3"/>
  <!-- Main shield shape - wider, classic shield proportions -->
  <path d="M32 6 
           L54 12 
           L54 26 
           C54 40, 44 48, 32 58 
           C20 48, 10 40, 10 26 
           L10 12 Z" 
        fill="url(#shieldGrad)" 
        stroke="#00ff88" 
        stroke-width="2.5"
        filter="url(#glow)"/>
  <!-- Inner shield highlight -->
  <path d="M32 10 
           L50 15 
           L50 26 
           C50 37, 42 44, 32 52 
           C22 44, 14 37, 14 26 
           L14 15 Z" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="1" 
        opacity="0.4"/>
  <!-- Center vertical accent -->
  <line x1="32" y1="18" x2="32" y2="48" 
        stroke="#ffffff" 
        stroke-width="1.5" 
        opacity="0.5"/>
</svg>
