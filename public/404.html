<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - NexCMS</title>
  <meta name="description" content="The page you’re looking for isn’t here. Explore the latest NexCMS news and security insights.">
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="${process.env.SITE_URL || 'http://localhost:3000'}/">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=5a8f3b2c">
  <meta name="theme-color" content="#0a0a0a">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 720px;
      width: 100%;
      background: #111111;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.45);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #0a0a0a;
      background: linear-gradient(135deg, #00ff88, #00cc6a);
      padding: 6px 12px;
      border-radius: 999px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 2.2rem;
      margin-bottom: 12px;
    }
    p {
      color: #cfcfcf;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .links a {
      text-decoration: none;
      color: #00ff88;
      border: 1px solid rgba(0, 255, 136, 0.3);
      padding: 10px 16px;
      border-radius: 10px;
      font-weight: 600;
      transition: all 0.2s ease;
    }
    .links a:hover {
      background: rgba(0, 255, 136, 0.1);
      border-color: rgba(0, 255, 136, 0.6);
      transform: translateY(-1px);
    }
    .hint {
      margin-top: 20px;
      font-size: 0.9rem;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">404 Error</span>
    <h1>We can’t find that page.</h1>
    <p>
      The link may be outdated or the page moved. Use the shortcuts below to get back
      to the latest NexCMS coverage.
    </p>
    <div class="links">
      <a href="/">Go to homepage</a>
      <a href="/category/cybersecurity">Cybersecurity</a>
      <a href="/category/technology">Technology</a>
      <a href="/category/cryptocurrency">Crypto</a>
      <a href="/category/gaming">Gaming</a>
      <a href="/contact">Contact</a>
    </div>
    <div class="hint">If you believe this is a mistake, please let us know.</div>
  </div>
</body>
</html>
